services:
  # ── Ollama (ROCm / AMD GPU) ───────────────────────────────────────────────
  ollama:
    image: ollama/ollama:rocm
    container_name: ollama-x-llm-search
    devices:
      - /dev/kfd
      - /dev/dri
    volumes:
      - ./config/models:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  # ── One-shot model puller ─────────────────────────────────────────────────
  # Pulls the model in the background after ollama is healthy.
  # x-llm-search starts immediately — the model appears in the picker
  # automatically once the download finishes.
  ollama-pull:
    image: ollama/ollama:rocm
    container_name: ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "qwen3.5:9b"]
    restart: "no"

  # ── X-LLM-Search web app ──────────────────────────────────────────────────
  x-llm-search:
    build: .
    container_name: x-llm-search
    ports:
      - "8000:8000"
    volumes:
      - ./config/app:/app/config
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      ollama:
        condition: service_healthy
      searxng:
        condition: service_started
    restart: unless-stopped

  # ── SearXNG search engine ─────────────────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: searxng-x-llm-search
    ports:
      - "8080:8080"
    volumes:
      - ./config/searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
    restart: unless-stopped

<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <title>X-LLM-Search</title>
        <link rel="stylesheet" href="/static/css/style.css?v=4" />
    </head>
    <body>
        <!-- ── Header ── -->
        <header class="app-header">
            <div class="logo">
                <span class="logo-mark">✦</span>
                <span class="logo-text">X-LLM-Search</span>
            </div>
        </header>

        <!-- ── Chat area ── -->
        <main class="chat-wrapper">
            <!-- Scrollable message history — full viewport width so scrollbar sits at the right edge -->
            <div id="chatHistory" class="chat-history">
                <div class="welcome-message">
                    <h2>What do you want to find?</h2>
                    <p>
                        AI-powered web search — reads full pages, reasons across
                        sources, and cites every claim. Conversation is
                        remembered for the session.
                    </p>
                </div>
            </div>

            <!-- ── Pinned bottom bar ── -->
            <div class="input-area">
                <!-- Error banner -->
                <div id="errorPanel" class="error-panel hidden">
                    <span>⚠️</span>
                    <span id="errorMessage"></span>
                </div>

                <!-- Input box -->
                <div class="input-shell">
                    <textarea
                        id="queryInput"
                        placeholder="Ask anything…"
                        rows="1"
                    ></textarea>

                    <div class="controls-row">
                        <div class="controls-left">
                            <div class="model-picker" id="modelPicker">
                                <button
                                    class="model-btn"
                                    id="modelBtn"
                                    title="Select model"
                                >
                                    <span class="model-icon">⚡</span>
                                    <span id="modelLabel">Loading…</span>
                                    <span class="chevron">▾</span>
                                </button>
                                <ul
                                    class="model-menu hidden"
                                    id="modelMenu"
                                    role="listbox"
                                ></ul>
                            </div>
                        </div>

                        <div class="action-btns">
                            <button id="btnSearch" class="btn btn-primary">
                                Search
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <script src="/static/js/app.js?v=4"></script>
    </body>
</html>
